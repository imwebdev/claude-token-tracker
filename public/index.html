<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token Coach</title>
<style>
  :root {
    --bg: #fafafa;
    --fg: #171717;
    --card: #ffffff;
    --muted: #525252;          /* 7.81:1 on #fff — AAA */
    --dim: #595959;            /* 7.00:1 on #fff — AAA */
    --faint: #e5e5e5;
    --border: #e5e5e5;
    --separator: #f0f0f0;
    --accent: #6d5000;         /* 7.51:1 on #fff — AAA */
    --accent-dim: rgba(109, 80, 0, 0.08);
    --accent-muted: rgba(109, 80, 0, 0.5);
    --danger: #8b1a1a;         /* 9.29:1 on #fff — AAA */
    --danger-dim: rgba(139, 26, 26, 0.06);
    --shadow: 0 1px 2px rgba(0,0,0,0.04);
    --radius: 8px;
    --mono: "SF Mono", "Fira Code", "Cascadia Code", ui-monospace, monospace;

    /* Model tier — single hue, differentiated by opacity */
    --tier-high: var(--fg);
    --tier-mid: var(--muted);
    --tier-low: var(--dim);
  }

  [data-theme="dark"] {
    --bg: #0a0a0a;
    --fg: #e5e5e5;
    --card: #141414;
    --muted: #a3a3a3;          /* 7.30:1 on #141414 — AAA */
    --dim: #a0a0a0;            /* 7.04:1 on #141414 — AAA */
    --faint: #262626;
    --border: #262626;
    --separator: #1a1a1a;
    --accent: #d4a843;         /* 8.32:1 on #141414 — AAA */
    --accent-dim: rgba(212, 168, 67, 0.08);
    --accent-muted: rgba(212, 168, 67, 0.45);
    --danger: #f09090;         /* 7.98:1 on #141414 — AAA */
    --danger-dim: rgba(239, 68, 68, 0.08);
    --shadow: 0 1px 2px rgba(0,0,0,0.3);

    --tier-high: var(--fg);
    --tier-mid: var(--muted);
    --tier-low: var(--dim);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow-x: hidden; width: 100%; }
  html { -webkit-font-smoothing: antialiased; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg); color: var(--fg);
    line-height: 1.5; letter-spacing: -0.011em;
    transition: background 200ms, color 200ms;
  }
  ::selection { background: rgba(109, 80, 0, 0.2); }

  /* ─── Accessibility ──────────────────────── */
  /* Focus indicators — visible on all interactive elements */
  :focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: 4px;
  }
  /* Remove default focus ring when using mouse */
  :focus:not(:focus-visible) { outline: none; }

  /* Skip-to-content link */
  .skip-link {
    position: absolute; top: -100px; left: 16px; z-index: 100;
    background: var(--fg); color: var(--bg); padding: 8px 16px;
    font-size: 13px; font-weight: 600; border-radius: 0 0 6px 6px;
    text-decoration: none; transition: top 200ms;
  }
  .skip-link:focus { top: 0; }

  /* Screen-reader only text */
  .sr-only {
    position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  .page { max-width: 960px; margin: 0 auto; padding: 32px 16px 64px; overflow-x: hidden; width: 100%; }

  /* ─── Header ─────────────────────────────── */
  .hdr {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 32px; border-bottom: 1px solid var(--border); padding-bottom: 16px;
  }
  .hdr h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
  .hdr-right { display: flex; align-items: center; gap: 12px; }
  .hdr-live { font-size: 11px; color: var(--accent); font-weight: 500; }
  .hdr-live::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-right: 5px; vertical-align: 1px; }
  .theme-btn {
    font-size: 12px; color: var(--dim); background: none; border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px; cursor: pointer; font-family: inherit;
    transition: color 200ms, border-color 200ms;
  }
  .theme-btn:hover { color: var(--fg); border-color: var(--dim); }
  .hooks-on { color: var(--accent) !important; border-color: var(--accent-muted) !important; }
  .hooks-off { color: var(--danger) !important; border-color: var(--danger) !important; opacity: 0.7; }
  .tl-row-clickable { cursor: pointer; }
  .tl-row-clickable:hover { background: var(--accent-dim); }

  .analysis-card { margin-bottom: 12px; }
  .analysis-grade { font-family: var(--mono); font-size: 28px; font-weight: 700; line-height: 1; }
  .grade-A { color: #2d7a2d; } [data-theme="dark"] .grade-A { color: #5cb85c; }
  .grade-B { color: var(--accent); }
  .grade-C { color: #c07000; } [data-theme="dark"] .grade-C { color: #e09030; }
  .grade-D { color: var(--danger); }
  .analysis-summary { font-size: 13px; color: var(--muted); margin-left: 10px; }
  .analysis-tips { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--separator); }
  .analysis-tip { font-size: 12px; color: var(--dim); padding: 4px 0; display: flex; gap: 6px; }
  .analysis-tip::before { content: '→'; color: var(--accent-muted); flex-shrink: 0; }

  /* ─── Metrics bar ────────────────────────── */
  .metrics {
    display: flex; gap: 12px 20px; margin-bottom: 28px; flex-wrap: wrap;
    padding: 12px 0; border-bottom: 1px solid var(--separator);
  }
  .metric { display: flex; align-items: baseline; gap: 6px; }
  .metric-val {
    font-family: var(--mono); font-size: 18px; font-weight: 600;
    font-variant-numeric: tabular-nums; letter-spacing: -0.02em;
  }
  .metric-label { font-size: 12px; color: var(--dim); }
  .metric-accent .metric-val { color: var(--accent); }

  /* ─── Cards ──────────────────────────────── */
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; margin-bottom: 12px; overflow: hidden; min-width: 0;
  }
  .g2 > .card, .g2 > div > .card, .g2-eq > .card { margin-bottom: 0; }
  .card-hd {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 12px;
  }
  .card-hd h2 { font-size: 14px; font-weight: 600; }
  .card-hd .ct { font-family: var(--mono); font-size: 11px; color: var(--dim); }

  /* ─── Grid ───────────────────────────────── */
  .g2 { display: grid; grid-template-columns: 1fr 320px; gap: 12px; margin-bottom: 12px; }
  .g2 > * { min-width: 0; overflow: hidden; }
  .g2-eq { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .g2-eq > * { min-width: 0; }
  @media (max-width: 860px) { .g2 { grid-template-columns: 1fr; height: auto !important; } }
  @media (max-width: 640px) { .g2-eq { grid-template-columns: 1fr; } }

  /* ─── Savings card ───────────────────────── */
  .savings-hero {
    display: flex; gap: 24px; align-items: baseline; margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .savings-big {
    font-family: var(--mono); font-size: 28px; font-weight: 700;
    color: #16a34a; font-variant-numeric: tabular-nums; letter-spacing: -0.02em;
  }
  [data-theme="dark"] .savings-big { color: #4ade80; }
  .savings-sub { font-size: 12px; color: var(--dim); }
  .savings-sub strong { color: var(--muted); font-weight: 600; }
  .savings-chart { width: 100%; height: 120px; }
  .savings-legend {
    display: flex; gap: 16px; margin-top: 8px; font-size: 11px; color: var(--dim);
  }
  .savings-legend span::before {
    content: ''; display: inline-block; width: 10px; height: 3px;
    border-radius: 2px; margin-right: 4px; vertical-align: 2px;
  }
  .savings-legend .leg-actual::before { background: var(--accent); }
  .savings-legend .leg-counter::before { background: var(--dim); opacity: 0.4; }
  .savings-legend .leg-saved::before { background: #16a34a; opacity: 0.3; }
  [data-theme="dark"] .savings-legend .leg-saved::before { background: #4ade80; }

  /* ─── Model floor selector ────────────────── */
  .floor-row {
    display: flex; gap: 8px; align-items: stretch;
  }
  .floor-btn {
    flex: 1; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--card); color: var(--fg); cursor: pointer; text-align: left; font-family: inherit;
    transition: border-color 200ms, background 200ms;
  }
  .floor-btn:hover { border-color: var(--dim); }
  .floor-btn.on {
    border-color: var(--accent); background: var(--accent-dim);
  }
  .floor-btn strong {
    display: block; font-size: 13px; font-weight: 600; margin-bottom: 2px; color: var(--fg);
  }
  .floor-btn span {
    font-size: 11px; color: var(--muted); line-height: 1.4;
  }
  @media (max-width: 640px) { .floor-row { flex-direction: column; } }
  .floor-warn {
    margin-top: 10px; padding: 10px 12px; border-radius: 6px;
    border-left: 3px solid var(--accent); background: var(--accent-dim);
    font-size: 12px; color: var(--muted); line-height: 1.5;
  }
  .floor-warn strong { color: var(--fg); }
  .floor-warn code {
    font-family: var(--mono); font-size: 11px; background: var(--faint);
    padding: 2px 6px; border-radius: 3px;
  }

  /* ─── Dark mode AAA contrast overrides (floor section) ── */
  /* .floor-btn.on tints the card bg with accent-dim (~#161512); #a0a0a0 drops
     to ~6.85:1 on that surface — below the 7:1 AAA threshold. Bump to #b2b2b2
     which clears 7:1 on both the tinted active state and the plain card bg. */
  [data-theme="dark"] .floor-btn.on span {
    color: #b2b2b2;
  }
  /* .floor-warn code sits on var(--faint)=#262626. The inherited var(--muted)
     (#a3a3a3) only achieves ~5.1:1 on that surface — fails AAA. Use a lighter
     neutral that clears 7:1 on #262626 (needs ≥ #ababab; use #d0d0d0 for
     comfortable margin). */
  [data-theme="dark"] .floor-warn code {
    color: #d0d0d0;
  }

  /* ─── Model labels ───────────────────────── */
  .ml { font-family: var(--mono); font-size: 11px; font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
  .ml-opus { font-weight: 700; color: var(--tier-high); }
  .ml-sonnet { font-weight: 500; color: var(--tier-mid); }
  .ml-haiku { font-weight: 400; color: var(--tier-low); }
  .ml-codex { font-weight: 400; font-style: italic; color: var(--tier-low); }

  /* ─── Tabs / Filters ─────────────────────── */
  .tabs { display: flex; gap: 2px; margin-bottom: 10px; }
  .tab {
    font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 4px;
    border: none; background: transparent; color: var(--dim);
    cursor: pointer; font-family: inherit; transition: all 150ms;
  }
  .tab:hover { color: var(--muted); }
  .tab.on { background: var(--faint); color: var(--fg); }

  .filters { display: flex; gap: 4px; margin-bottom: 10px; }
  .flt {
    font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 4px;
    border: 1px solid transparent; background: transparent; color: var(--dim);
    cursor: pointer; font-family: var(--mono); transition: all 150ms;
  }
  .flt:hover { color: var(--muted); }
  .flt.on { border-color: var(--border); color: var(--fg); background: var(--separator); }

  /* ─── Timeline ───────────────────────────── */
  .tl-wrap { flex: 1; min-height: 0; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--faint) transparent; }
  .tl-row { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--separator); align-items: flex-start; min-width: 0; }
  .tl-row:last-child { border-bottom: none; }
  .tl-time { font-family: var(--mono); font-size: 11px; color: var(--dim); width: 40px; flex-shrink: 0; padding-top: 2px; }
  .tl-time small { display: block; font-size: 10px; color: var(--dim); opacity: 0.6; }
  .tl-model { flex-shrink: 0; min-width: 140px; padding-top: 2px; }
  .tl-body { flex: 1; min-width: 0; }
  .tl-desc { font-size: 13px; color: var(--muted); line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tl-meta { display: flex; gap: 8px; margin-top: 2px; align-items: center; }
  .tl-proj { font-size: 11px; color: var(--dim); font-weight: 500; }
  .tl-sz { font-family: var(--mono); font-size: 10px; color: var(--dim); }
  .tl-badge {
    display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 3px;
    margin-left: 4px; font-weight: 500; vertical-align: 1px; white-space: nowrap;
  }
  .tl-badge-down { color: #16a34a; background: rgba(22, 163, 74, 0.1); }
  .tl-badge-up { color: var(--danger); background: var(--danger-dim); }
  .tl-badge-stay { color: var(--dim); background: var(--separator); }
  [data-theme="dark"] .tl-badge-down { color: #4ade80; background: rgba(22, 163, 74, 0.12); }
  .tl-saved {
    font-family: var(--mono); font-size: 11px; color: #16a34a; font-weight: 600;
    margin-left: 8px; white-space: nowrap;
  }
  [data-theme="dark"] .tl-saved { color: #4ade80; }

  /* ─── Insights ───────────────────────────── */
  .ins-item {
    padding: 10px 12px; margin-bottom: 8px; border-radius: 6px;
    border-left: 3px solid var(--border); background: transparent;
  }
  .ins-item:last-child { margin-bottom: 0; }
  .ins-item-crit {
    border-left-color: var(--danger); background: var(--danger-dim);
  }
  .ins-item-warn {
    border-left-color: var(--accent); background: var(--accent-dim);
  }
  .ins-item-ok {
    border-left-color: #16a34a; background: rgba(22, 163, 74, 0.06);
  }
  [data-theme="dark"] .ins-item-ok { background: rgba(22, 163, 74, 0.08); }
  .ins-item-info {
    border-left-color: var(--dim); background: transparent;
  }
  .ins-title { font-size: 13px; font-weight: 600; color: var(--fg); margin-bottom: 3px; display: flex; align-items: center; gap: 6px; }
  .ins-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .ins-dot-crit { background: var(--danger); }
  .ins-dot-warn { background: var(--accent); }
  .ins-dot-info { background: var(--dim); }
  .ins-dot-ok { background: #16a34a; }
  .ins-detail { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 6px; }
  .ins-action {
    display: inline-block; font-size: 11px; font-weight: 500;
    color: var(--accent); background: var(--accent-dim);
    padding: 3px 10px; border-radius: 4px;
    line-height: 1.4;
  }
  .ins-item-crit .ins-action {
    color: var(--danger); background: var(--danger-dim);
  }

  /* ─── Hour grid ──────────────────────────── */
  .hr-grid { display: grid; grid-template-columns: repeat(24, 1fr); gap: 2px; }
  .hr-cell { aspect-ratio: 1; border-radius: 3px; }
  .hr-labels { display: flex; justify-content: space-between; margin-top: 4px; font-size: 10px; color: var(--dim); }

  /* ─── (routing decisions merged into timeline) ── */

  /* ─── Session costs ──────────────────────── */
  .sc-summary { display: flex; gap: 12px 24px; flex-wrap: wrap; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--separator); }
  .sc-stat-val { font-family: var(--mono); font-size: 20px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .sc-stat-label { font-size: 11px; color: var(--dim); }
  .sc-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--separator); gap: 8px; min-width: 0; }
  .sc-row:last-child { border-bottom: none; }

  /* ─── Misc ───────────────────────────────── */
  .empty { padding: 24px; text-align: center; color: var(--dim); font-size: 13px; }
  .footer { text-align: center; padding: 24px 0; font-size: 11px; color: var(--dim); margin-top: 12px; }
  .loading { text-align: center; padding: 120px 40px; color: var(--dim); font-size: 14px; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .anim { animation: fadeIn 300ms both; }
  .d1 { animation-delay: 50ms; }
  .d2 { animation-delay: 100ms; }
  .d3 { animation-delay: 150ms; }
  .d4 { animation-delay: 200ms; }
  .morph-ready .anim { animation: none; opacity: 1; }

  .stat-val, .metric-val, .ct, .sc-stat-val { transition: color 200ms; }
  [id^="v-"] { transition: opacity 100ms; }
</style>
</head>
<body>
<a href="#main-content" class="skip-link">Skip to content</a>
<div class="page">
  <div id="app" role="application" aria-label="Token Coach Dashboard"><div class="loading" role="status" aria-live="polite">Loading&hellip;</div></div>
</div>

<script>
let DATA = null;
let activeFilter = 'all';
let timelineTab = 'auto';
let activeProject = 'all';
let selectedDay = null; // date string YYYY-MM-DD when drilling into a day

/** Turn a path-based project slug into a clean display name */
function cleanProject(slug) {
  if (!slug) return 'unknown';
  // Strip leading path segments like "-home-cchhita-"
  const parts = slug.replace(/^-/, '').split('-');
  // Find the last meaningful segment (skip home, username)
  if (parts.length >= 3) return parts.slice(2).join('-');
  if (parts.length === 2) return parts[1];
  return slug;
}

function getTheme() { return localStorage.getItem('token-coach-theme') || 'dark'; }
function setTheme(t) { localStorage.setItem('token-coach-theme', t); document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : ''); }
function toggleTheme() { setTheme(getTheme() === 'dark' ? 'light' : 'dark'); render(); }

function toggleAnalysis() {
  const body = document.getElementById('v-analysis-body');
  const card = document.getElementById('v-analysis-card');
  if (!body) return;
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  localStorage.setItem('analysis-open', !isOpen);
  const hd = card?.querySelector('.card-hd');
  if (hd) hd.setAttribute('aria-expanded', !isOpen);
}

async function toggleHooks() {
  const btn = document.getElementById('v-hooks-btn');
  if (btn) btn.textContent = '...';
  try {
    const res = await fetch('/api/hooks/toggle', { method: 'POST' });
    const { enabled } = await res.json();
    if (DATA) DATA.hooksEnabled = enabled;
    if (btn) {
      btn.textContent = 'Hooks ' + (enabled ? 'ON' : 'OFF');
      btn.className = 'theme-btn hooks-btn ' + (enabled ? 'hooks-on' : 'hooks-off');
      btn.setAttribute('aria-label', enabled ? 'Hooks enabled — click to disable' : 'Hooks disabled — click to enable');
    }
  } catch (e) {
    if (btn) btn.textContent = 'Error';
  }
}
setTheme(getTheme());

function setText(id, val) { const el = document.getElementById(id); if (!el) return; const s = String(val); if (el.textContent !== s) el.textContent = s; }
function setStyle(id, prop, val) { const el = document.getElementById(id); if (el && el.style[prop] !== val) el.style[prop] = val; }
function setSection(id, html) {
  const el = document.getElementById(id); if (!el) return;
  if (el.innerHTML.replace(/\s+/g,' ').trim() === html.replace(/\s+/g,' ').trim()) return;
  el.style.opacity = '0.3';
  requestAnimationFrame(() => { el.innerHTML = html; requestAnimationFrame(() => { el.style.opacity = '1'; }); });
}

function softRefresh() {
  const D = DATA; if (!D) return;
  const s = D.stats, r = D.routing, today = r.todayStats, tab = getEffectiveTab();
  const bm = D.todayTokenUsage?.byModel || {};
  setText('v-calls', (bm.opus?.calls||0) + (bm.sonnet?.calls||0) + (bm.haiku?.calls||0) + (bm.unknown?.calls||0));
  setText('v-opus', bm.opus?.calls || 0);
  setText('v-sonnet', bm.sonnet?.calls || 0);
  setText('v-haiku', bm.haiku?.calls || 0);
  setText('v-sessions', Object.keys(D.todayTokenUsage?.bySession || D.sessionCosts?.sessions || {}).length);
  const todayCost = D.todayTokenUsage ? D.todayTokenUsage.totalCost : (D.sessionCosts ? Object.values(D.sessionCosts.sessions||{}).reduce((a,s)=>a+s.estimatedCost,0) : 0);
  setText('v-cost', '$' + todayCost.toFixed(2));
  setText('v-total', r.totalTasks + ' total');
  setText('v-tab-today', 'Today (' + today.totalTasks + ')');
  setSection('v-timeline', renderTimeline(tab));
  setText('v-ins-ct', D.insights.length);
  setSection('v-insights', renderInsights(D.insights));
  setSection('v-rd-strip', renderRoutingStrip(D.routingEvents));
  setText('v-sc-ct', Object.keys(D.sessionCosts?.sessions||{}).length + ' today');
  setSection('v-sc-body', renderSessionCosts(D.sessionCosts));
  setText('v-learn-ct', (D.learning?.totalSamples || 0) + ' samples');
  setSection('v-learn-body', renderLearning(D.learning));
  setText('v-hogs-ct', ((D.tokenHogs?.totalToolCalls||0) + (D.tokenHogs?.totalDispatches||0)) + ' calls');
  setSection('v-hogs-body', renderTokenHogs(D.tokenHogs));
  setSection('v-hours', renderHourGrid(s.hourCounts));
  if (D.analysis?.grade) setText('v-analysis-grade', `Grade ${D.analysis.grade}`);
  setSection('v-analysis-body', renderAnalysis(D.analysis));
}

async function load() {
  const isFirst = !DATA;
  try {
    DATA = await (await fetch('/api/dashboard')).json();
    isFirst ? render() : softRefresh();
    loadMatrix();
  } catch (e) {
    if (isFirst) document.getElementById('app').innerHTML = `<div class="loading">Error: ${e.message}</div>`;
  }
}

let MATRIX_STATE = null;

async function loadMatrix() {
  const target = document.getElementById('v-matrix-body');
  if (!target) return;
  try {
    MATRIX_STATE = await (await fetch('/api/matrix')).json();
    target.innerHTML = renderMatrix(MATRIX_STATE);
  } catch (e) {
    target.innerHTML = `<div style="color:var(--danger)">Matrix load failed: ${esc(e.message)}</div>`;
  }
}

function renderMatrix(state) {
  if (!state || !state.matrix) return '<div>No matrix data.</div>';
  const { families, complexities, matrix } = state;
  const learnerByFamilyModel = {};
  for (const entry of state.learnerStats || []) {
    learnerByFamilyModel[`${entry.family}:${entry.model}`] = entry;
  }
  function cellOptions(family, cx, current) {
    const opts = ['haiku', 'sonnet', 'opus'].map(m => {
      const e = learnerByFamilyModel[`${family}:${m}`];
      const title = e ? `${m}: ${Math.round(e.rate * 100)}% success · ${e.samples} outcomes` : `${m}: no data yet`;
      return `<option value="${m}" ${m === current ? 'selected' : ''} title="${title}">${m}</option>`;
    }).join('');
    return `<select data-family="${family}" data-cx="${cx}" class="matrix-cell" style="font-family:var(--mono);font-size:11px;padding:3px 5px;border:1px solid var(--border);background:var(--card);color:var(--fg);border-radius:4px">${opts}</select>`;
  }
  const rows = families.map(f => {
    const row = matrix[f] || {};
    return `
      <tr>
        <td style="padding:4px 8px 4px 0;color:var(--fg);font-family:var(--mono);font-size:11px">${f}</td>
        ${complexities.map(cx => `<td style="padding:4px 8px">${cellOptions(f, cx, row[cx] || 'sonnet')}</td>`).join('')}
      </tr>
    `;
  }).join('');
  const migrationNote = state.migratedFromForceModel
    ? `<div style="font-size:11px;color:var(--accent);margin-bottom:8px;padding:8px;background:var(--accent-dim);border-radius:4px">Migrated from <code>force_model=${esc(state.migratedFromForceModel)}</code>. All cells seeded. Adjust below and save to replace the legacy setting.</div>`
    : '';
  const defaultsNote = state.isUsingDefaults
    ? `<div style="font-size:11px;color:var(--dim);margin-bottom:8px">Showing built-in defaults. Save to persist your own matrix.</div>`
    : '';
  return `
    ${migrationNote}
    ${defaultsNote}
    <div style="overflow-x:auto">
    <table style="border-collapse:collapse;margin-bottom:12px">
      <thead>
        <tr style="color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:0.5px">
          <th style="text-align:left;padding:4px 8px 4px 0;font-weight:500;border-bottom:1px solid var(--separator)">family</th>
          ${complexities.map(cx => `<th style="text-align:left;padding:4px 8px;font-weight:500;border-bottom:1px solid var(--separator)">${cx}</th>`).join('')}
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <span style="font-size:11px;color:var(--dim)">Preset:</span>
      <select id="matrix-preset" style="font-family:var(--mono);font-size:11px;padding:4px 6px;border:1px solid var(--border);background:var(--card);color:var(--fg);border-radius:4px">
        <option value="">— choose —</option>
        ${Object.keys(state.presets || {}).map(name => `<option value="${esc(name)}">${esc(name)}</option>`).join('')}
      </select>
      <button id="matrix-reset" class="btn" style="padding:6px 12px;background:transparent;color:var(--fg);border:1px solid var(--border);border-radius:4px;font-size:12px;cursor:pointer" title="Suggest cells based on your own learner success rates">Suggest from learner data</button>
      <button id="matrix-save" class="btn" style="padding:6px 14px;background:var(--fg);color:var(--bg);border:none;border-radius:4px;font-size:12px;cursor:pointer;margin-left:auto">Save matrix</button>
      <span id="matrix-status" style="font-size:11px;color:var(--dim);width:100%;text-align:right;margin-top:4px"></span>
    </div>
    <div style="font-size:10px;color:var(--dim);margin-top:10px;line-height:1.5">
      <strong style="color:var(--fg)">Presets</strong> are one-click starting points — pick one, tweak individual cells, then Save. <strong style="color:var(--fg)">Balanced</strong> is the default. <strong style="color:var(--fg)">Coder</strong> leans opus on code/debug. <strong style="color:var(--fg)">Reader</strong> and <strong style="color:var(--fg)">Budget</strong> lean haiku. <strong style="color:var(--fg)">Max accuracy</strong> sets every cell to opus. Hover any cell to see your historical success rate for that family × model.
    </div>
  `;
}

function matrixStatus(msg, color) {
  const el = document.getElementById('matrix-status');
  if (!el) return;
  el.style.color = color || 'var(--dim)';
  el.textContent = msg;
  if (msg) setTimeout(() => { el.textContent = ''; }, 3000);
}

function collectMatrix() {
  const out = {};
  document.querySelectorAll('.matrix-cell').forEach(sel => {
    const f = sel.dataset.family;
    const cx = sel.dataset.cx;
    if (!out[f]) out[f] = {};
    out[f][cx] = sel.value;
  });
  return out;
}

document.addEventListener('click', async (e) => {
  if (e.target?.id === 'matrix-save') {
    try {
      const matrix = collectMatrix();
      const r = await fetch('/api/matrix', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ matrix }),
      });
      if (!r.ok) throw new Error((await r.json()).error || 'save failed');
      matrixStatus('Saved. Takes effect on next prompt.', 'var(--accent)');
    } catch (err) {
      matrixStatus(`Save failed: ${err.message}`, 'var(--danger)');
    }
  }
  if (e.target?.id === 'matrix-reset') {
    try {
      const r = await fetch('/api/matrix/suggest');
      const { matrix } = await r.json();
      for (const sel of document.querySelectorAll('.matrix-cell')) {
        const f = sel.dataset.family;
        const cx = sel.dataset.cx;
        if (matrix[f]?.[cx]) sel.value = matrix[f][cx];
      }
      matrixStatus('Reset from learner data. Click "Save matrix" to persist.', 'var(--accent)');
    } catch (err) {
      matrixStatus(`Reset failed: ${err.message}`, 'var(--danger)');
    }
  }
});

document.addEventListener('change', (e) => {
  if (e.target?.id === 'matrix-preset' && e.target.value) {
    const presetName = e.target.value;
    const matrix = MATRIX_STATE?.presets?.[presetName];
    if (!matrix) return;
    for (const sel of document.querySelectorAll('.matrix-cell')) {
      const f = sel.dataset.family;
      const cx = sel.dataset.cx;
      if (matrix[f]?.[cx]) sel.value = matrix[f][cx];
    }
    e.target.value = '';
    matrixStatus(`Loaded preset: ${presetName}. Click "Save matrix" to persist.`, 'var(--accent)');
  }
});

function $(v) { return typeof v === 'number' ? v.toLocaleString() : v; }
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function modelLabel(m) {
  const t = m.includes('opus') ? 'opus' : m.includes('sonnet') ? 'sonnet' : m.includes('haiku') ? 'haiku' : m.includes('codex') ? 'codex' : m;

}

}

  return `

}

          ${d.models.sonnet ? `<span class="ml ml-sonnet">sonnet×${d.models.sonnet}</span>` : ''}

function renderDayDetail(date) {

    const finalModel = isDel ? t.model.split('>')[1] : t.model;
    const baseModel = isDel ? t.model.split('>')[0] : (t.baseModel || null);

    const finalTier = tier[finalModel] ?? 1;
    const baseTier = baseModel ? (tier[baseModel] ?? 1) : finalTier;

}

function renderSavings(savings) {
  if (!savings) return '<div class="empty">No data yet.</div>';
  const t = savings.today || {};
  const daily = savings.daily || [];

  // Gap between actual spend and all-opus counterfactual.
  // This reflects your model mix (haiku/sonnet/opus split) — not necessarily this tool's impact.
  // Direct tool attribution lives in the "Cost since install" card (deduper savings).
  const cumGap = daily.reduce((sum, d) => sum + (d.savings || 0), 0) + (t.savings || 0);
  const todayGap = t.savings || 0;

  let html = `<div class="savings-hero">
    <div>
      <div class="savings-big">$${cumGap.toFixed(2)}</div>
      <div class="savings-sub">gap vs all-opus &mdash; reflects your model mix, not directly attributed to this tool</div>
    </div>
    <div>
      <div class="savings-sub"><strong>$${todayGap.toFixed(2)}</strong> gap today</div>
      <div class="savings-sub"><strong>$${(t.actual || 0).toFixed(2)}</strong> actual &middot; <strong>$${(t.counterfactual || 0).toFixed(2)}</strong> if all opus</div>
    </div>
  </div>`;

  // Build SVG chart — last 14 days + today
  const chartData = [...daily];
  const todayStr = new Date().toISOString().slice(0, 10);
  // Add today if not already in daily
  if (!chartData.length || chartData[chartData.length - 1].date !== todayStr) {
    chartData.push({ date: todayStr, actual: Math.round((t.actual || 0) * 100) / 100, counterfactual: Math.round((t.counterfactual || 0) * 100) / 100, savings: Math.round(todayGap * 100) / 100 });
  }

  if (chartData.length < 2) {
    html += '<div class="savings-sub" style="margin-top:8px">Need at least 2 days of data for the chart.</div>';
    return html;
  }

  const W = 600, H = 120, PAD = 28;
  const maxVal = Math.max(...chartData.map(d => Math.max(d.actual, d.counterfactual)), 1);
  const xStep = (W - PAD * 2) / (chartData.length - 1);

  function y(val) { return H - PAD - ((val / maxVal) * (H - PAD * 2)); }

  const actualPoints = chartData.map((d, i) => `${PAD + i * xStep},${y(d.actual)}`);
  const counterPoints = chartData.map((d, i) => `${PAD + i * xStep},${y(d.counterfactual)}`);

  // Shaded savings area (between the two lines)
  const areaPath = `M${counterPoints[0]} ${counterPoints.map(p => `L${p}`).join(' ')} L${PAD + (chartData.length - 1) * xStep},${y(chartData[chartData.length - 1].actual)} ${[...actualPoints].reverse().map(p => `L${p}`).join(' ')} Z`;

  // X-axis labels (show every few days)
  const labelInterval = chartData.length <= 7 ? 1 : chartData.length <= 14 ? 2 : 3;
  const xLabels = chartData.map((d, i) => {
    if (i % labelInterval !== 0 && i !== chartData.length - 1) return '';
    const label = d.date.slice(5); // MM-DD
    return `<text x="${PAD + i * xStep}" y="${H - 4}" text-anchor="middle" fill="currentColor" opacity="0.4" font-size="9" font-family="var(--mono)">${label}</text>`;
  }).join('');

  // Y-axis: just max value
  const yLabel = `<text x="${PAD - 4}" y="${PAD}" text-anchor="end" fill="currentColor" opacity="0.4" font-size="9" font-family="var(--mono)">$${maxVal.toFixed(0)}</text>`;

  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const savedFill = isDark ? 'rgba(74, 222, 128, 0.12)' : 'rgba(22, 163, 74, 0.1)';
  const accentStroke = isDark ? '#d4a843' : '#6d5000';
  const dimStroke = isDark ? 'rgba(163,163,163,0.3)' : 'rgba(82,82,82,0.25)';

  html += `<svg class="savings-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img" aria-label="Savings chart: actual vs counterfactual cost over ${chartData.length} days">
    <path d="${areaPath}" fill="${savedFill}" />
    <polyline points="${counterPoints.join(' ')}" fill="none" stroke="${dimStroke}" stroke-width="1.5" stroke-dasharray="4,3" />
    <polyline points="${actualPoints.join(' ')}" fill="none" stroke="${accentStroke}" stroke-width="2" />
    ${xLabels}
    ${yLabel}
  </svg>`;

  html += `<div class="savings-legend">
    <span class="leg-actual">actual spend</span>
    <span class="leg-counter">if all opus</span>
    <span class="leg-saved">gap (model mix)</span>
  </div>`;

  return html;
}

function renderCostSinceInstall(D) {
  const installDate = D.installDate ? D.installDate.slice(0, 10) : null;
  const series = D.dailyCostSeries || [];
  const dedupe = D.dedupeStats || { total: 0, totalTokens: 0, totalLines: 0, daily: [] };

  if (!installDate) {
    return `<div class="empty">Install date not yet recorded. Run <code>node bin/cli.js init</code> to anchor the chart.</div>`;
  }

  // Filter cost series to dates >= install
  const sinceInstall = series.filter(d => d.date >= installDate);
  const totalCost = sinceInstall.reduce((s, d) => s + (d.cost || 0), 0);

  const daysSince = Math.max(1, Math.round((Date.now() - new Date(installDate).getTime()) / 86400000));

  let html = `<div class="savings-hero">
    <div>
      <div class="savings-big" style="color:var(--muted)">$${totalCost.toFixed(2)}</div>
      <div class="savings-sub">actual spend since ${installDate} (${daysSince}d)</div>
    </div>
    <div>
      <div class="savings-sub"><strong>${dedupe.total}</strong> redundant reads blocked</div>
      <div class="savings-sub"><strong>~${dedupe.totalTokens.toLocaleString()}</strong> tokens saved by deduper (#81)</div>
    </div>
  </div>`;

  if (sinceInstall.length < 2) {
    html += `<div class="savings-sub" style="margin-top:8px">Need at least 2 days of data since install for the trend line. Check back tomorrow.</div>`;
  } else {
    const W = 600, H = 120, PAD = 28;
    const maxVal = Math.max(...sinceInstall.map(d => d.cost || 0), 1);
    const xStep = (W - PAD * 2) / (sinceInstall.length - 1);
    const y = val => H - PAD - ((val / maxVal) * (H - PAD * 2));
    const points = sinceInstall.map((d, i) => `${PAD + i * xStep},${y(d.cost || 0)}`);

    // Install-date marker at x=0
    const installX = PAD;
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const accentStroke = isDark ? '#d4a843' : '#6d5000';
    const markerStroke = isDark ? 'rgba(74,222,128,0.5)' : 'rgba(22,163,74,0.5)';

    const labelInterval = sinceInstall.length <= 7 ? 1 : sinceInstall.length <= 14 ? 2 : 4;
    const xLabels = sinceInstall.map((d, i) => {
      if (i % labelInterval !== 0 && i !== sinceInstall.length - 1) return '';
      return `<text x="${PAD + i * xStep}" y="${H - 4}" text-anchor="middle" fill="currentColor" opacity="0.4" font-size="9" font-family="var(--mono)">${d.date.slice(5)}</text>`;
    }).join('');

    const yLabel = `<text x="${PAD - 4}" y="${PAD}" text-anchor="end" fill="currentColor" opacity="0.4" font-size="9" font-family="var(--mono)">$${maxVal.toFixed(2)}</text>`;

    html += `<svg class="savings-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img" aria-label="Daily cost since install: ${sinceInstall.length} days">
      <line x1="${installX}" y1="${PAD}" x2="${installX}" y2="${H - PAD}" stroke="${markerStroke}" stroke-width="1" stroke-dasharray="2,3" />
      <text x="${installX + 4}" y="${PAD + 9}" fill="currentColor" opacity="0.5" font-size="9" font-family="var(--mono)">installed</text>
      <polyline points="${points.join(' ')}" fill="none" stroke="${accentStroke}" stroke-width="2" />
      ${xLabels}
      ${yLabel}
    </svg>`;
  }

  html += `<div class="savings-sub" style="margin-top:10px;line-height:1.5;border-top:1px solid var(--border);padding-top:10px">
    <strong>Honest note:</strong> the raw trend above reflects your total Claude Code spend — it goes up when you use Claude more, down when you use it less. We don't claim this tool caused any specific change. The deduper savings (tokens blocked by #81) are the one number we attribute directly; every redundant read we blocked would otherwise have entered your context.
  </div>`;

  return html;
}

function saveHistoryDays(val) {
  const days = parseInt(val, 10);
  if (!days || days < 1 || days > 365) return;
  fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ history_days: days }) })
    .then(r => r.json()).then(cfg => { if (DATA) DATA.config = cfg; })
    .catch(() => {});
}

function toggleFeedbackLoop() {
  const current = DATA?.config?.feedback_loop_enabled || false;
  const next = !current;
  fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ feedback_loop_enabled: next }) })
    .then(r => r.json()).then(cfg => {
      if (DATA) DATA.config = cfg;
      const btn = document.getElementById('v-feedback-btn');
      if (btn) {
        btn.textContent = 'Feedback ' + (next ? 'ON' : 'OFF');
        btn.className = 'theme-btn hooks-btn ' + (next ? 'hooks-on' : 'hooks-off');
        btn.setAttribute('aria-label', next ? 'Feedback loop enabled — click to disable' : 'Feedback loop disabled — click to enable');
        btn.setAttribute('aria-pressed', String(next));
      }
    }).catch(() => {});
}

function saveFeedbackRate(val) {

  fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ feedback_loop_sample_rate: pct / 100 }) })

function renderTimeline(tab) {
  if (!DATA) return '';
  if (tab === 'daily') return renderDaily();
  const r = DATA.routing;
  let entries = tab === 'today' ? (r.todayStats.tasks || []) : DATA.taskLog;
  if (activeFilter !== 'all') entries = entries.filter(t => t.model.includes(activeFilter));
  if (!entries.length) return `<div class="empty">${tab === 'today' ? 'No tasks today' : 'No matching tasks'}</div>`;

  // Approximate cost per prompt by model (USD) — rough estimates for display
  const promptCost = { opus: 0.10, sonnet: 0.03, haiku: 0.005 };

  return (tab === 'today' ? entries : entries.slice(0, 500)).map(t => {
    const time = tab === 'today' ? t.timestamp.slice(11, 16) : t.timestamp.slice(5, 16).replace('T', ' ');
    // Handle legacy "opus>sonnet" format
    const isDel = t.model.includes('>');
    const finalModel = isDel ? t.model.split('>')[1] : t.model;
    const baseModel = isDel ? t.model.split('>')[0] : (t.baseModel || null);

    // Build the routing story
    let badge = '';
    let savings = '';
    const tier = { haiku: 0, sonnet: 1, opus: 2 };
    const finalTier = tier[finalModel] ?? 1;
    const baseTier = baseModel ? (tier[baseModel] ?? 1) : finalTier;

    if (t.isSubagent) {
      // Subagent: opus delegated this to a cheaper model
      badge = '<span class="tl-badge tl-badge-down">subagent</span>';
      const saved = (promptCost[baseModel] || promptCost.opus) - (promptCost[finalModel] || 0);
      if (saved > 0) savings = `<span class="tl-saved">~$${saved.toFixed(2)} saved</span>`;
    } else if (baseModel && baseTier > finalTier) {
      // Router downgraded: base was more expensive than final
      badge = `<span class="tl-badge tl-badge-down">↓ routed from ${baseModel}</span>`;
      const saved = (promptCost[baseModel] || 0) - (promptCost[finalModel] || 0);
      if (saved > 0) savings = `<span class="tl-saved">~$${saved.toFixed(2)} saved</span>`;
    } else if (baseModel && baseTier < finalTier) {
      // Router upgraded: task needed more capability
      badge = `<span class="tl-badge tl-badge-up">↑ upgraded from ${baseModel}</span>`;
    } else if (baseModel && baseTier === finalTier) {
      // Base matched final — no change needed
      badge = `<span class="tl-badge tl-badge-stay">no change</span>`;
    } else {
      // No baseModel data (older events) — just show the recommendation
      badge = `<span class="tl-badge tl-badge-stay">recommended</span>`;
    }

    return `<div class="tl-row">
      <div class="tl-time">${time}</div>
      <div class="tl-model">${modelLabel(finalModel)}${badge}</div>
      <div class="tl-body">
        <div class="tl-desc">${esc(t.description)}${savings}</div>
        <div class="tl-meta"><span class="tl-proj">${esc(t.project)}</span><span class="tl-sz">${t.size}</span></div>
      </div>
    </div>`;
  }).join('');
}

function renderTokenHogs(hogs) {
  if (!hogs || (hogs.totalToolCalls === 0 && hogs.totalDispatches === 0)) {
    return '<div class="empty">No tool call data yet. Usage patterns will appear as hooks capture activity.</div>';
  }

  let html = '';

  // Agent types (most impactful — each dispatch = full model invocation)
  if (hogs.agentTypes.length > 0) {
    html += '<div style="margin-bottom:12px"><div style="font-size:12px;font-weight:600;margin-bottom:6px">Agent dispatches</div>';
    for (const a of hogs.agentTypes.slice(0, 8)) {
      const models = Object.entries(a.models || {}).map(([m, c]) => `<span class="ml ml-${m}">${m}</span>&times;${c}`).join('  ');
      html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--separator)">
        <span style="font-size:12px">${esc(a.name)}</span>
        <span style="font-size:11px">${models} <span style="color:var(--dim);margin-left:6px;font-family:var(--mono)">${a.dispatches}</span></span>
      </div>`;
    }
    html += '</div>';
  }

  // MCP servers
  if (hogs.mcpServers.length > 0) {
    html += '<div style="margin-bottom:12px"><div style="font-size:12px;font-weight:600;margin-bottom:6px">MCP servers</div>';
    for (const m of hogs.mcpServers.slice(0, 8)) {
      const topTool = Object.entries(m.tools || {}).sort((a, b) => b[1] - a[1])[0];
      html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--separator)">
        <div><span style="font-size:12px;font-weight:500">${esc(m.name)}</span>${topTool ? `<span style="font-size:11px;color:var(--dim);margin-left:8px">top: ${esc(topTool[0])}</span>` : ''}</div>
        <span style="font-family:var(--mono);font-size:11px">${m.calls} calls</span>
      </div>`;
    }
    html += '</div>';
  }

  // Top tools overall
  if (hogs.topTools.length > 0) {
    html += '<div><div style="font-size:12px;font-weight:600;margin-bottom:6px">Top tools</div>';
    const max = hogs.topTools[0]?.calls || 1;
    for (const t of hogs.topTools.slice(0, 10)) {
      const pct = Math.max((t.calls / max) * 100, 3);
      const isMcp = t.name.startsWith('mcp__');
      html += `<div style="display:flex;align-items:center;gap:8px;padding:3px 0">
        <span style="font-size:11px;width:120px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${isMcp ? 'color:var(--accent)' : ''}">${esc(t.name)}</span>
        <div style="flex:1;height:4px;background:var(--separator);border-radius:2px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${isMcp ? 'var(--accent)' : 'var(--dim)'};border-radius:2px"></div>
        </div>
        <span style="font-family:var(--mono);font-size:10px;color:var(--dim);width:32px;text-align:right;flex-shrink:0">${t.calls}</span>
      </div>`;
    }
    html += '</div>';
  }

  return html;
}

function renderProjectFilters(sc) {
  const sessions = sc?.sessions || {};
  const projects = new Set();
  for (const [, s] of Object.values(sessions).length ? Object.entries(sessions) : []) {
    projects.add(s.project || 'unknown');

  const sorted = [...projects].sort();
  if (sorted.length <= 1) return ''; // No filter needed for 0-1 projects
  let html = `<button class="flt ${activeProject==='all'?'on':''}" onclick="setProject('all')" aria-pressed="${activeProject==='all'}">all</button>`;

    const label = cleanProject(p);
    html += `<button class="flt ${activeProject===p?'on':''}" onclick="setProject('${esc(p)}')" aria-pressed="${activeProject===p}">${esc(label)}</button>`;

  return html;
}

function renderSessionCosts(sc) {
  const sessions = sc?.sessions || {};
  let entries = Object.entries(sessions).sort((a, b) => (b[1].lastActivity||'').localeCompare(a[1].lastActivity||''));
  if (!entries.length) return '<div class="empty">No session data yet.</div>';

  // Apply project filter
  if (activeProject !== 'all') {
    entries = entries.filter(([, s]) => s.project === activeProject);
    if (!entries.length) return '<div class="empty">No sessions for this project.</div>';
  }

  let totalCost = 0, totalPrompts = 0;
  const modelTotals = {};
  for (const [, s] of entries) {
    totalCost += s.estimatedCost;
    totalPrompts += s.prompts;
    for (const [m, c] of Object.entries(s.models || {})) {
      modelTotals[m] = (modelTotals[m] || 0) + c;
    }
  }
  const modelBreakdown = Object.entries(modelTotals)
    .sort((a, b) => b[1] - a[1])
    .map(([m, c]) => `<span class="ml ml-${m}">${m}</span>&nbsp;${c}`)
    .join('&nbsp;&nbsp;&nbsp;');

  let html = `<div class="sc-summary">
    <div><div class="sc-stat-val" style="color:var(--accent)">$${totalCost.toFixed(2)}</div><div class="sc-stat-label">cost${activeProject !== 'all' ? '' : ' today'}</div></div>
    <div><div class="sc-stat-val">${totalPrompts}</div><div class="sc-stat-label">API calls</div></div>
    <div><div class="sc-stat-val">${entries.length}</div><div class="sc-stat-label">sessions</div></div>
  </div>`;

  if (modelBreakdown) {
    html += `<div style="margin-bottom:10px;font-size:11px;color:var(--dim)">${modelBreakdown}</div>`;
  }

  html += '<div style="max-height:240px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--faint) transparent">';
  for (const [sid, s] of entries) {
    const time = s.lastActivity ? new Date(s.lastActivity).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
    const models = Object.entries(s.models||{}).map(([m,c]) => `<span class="ml ml-${m}">${m}</span> <span style="color:var(--dim);font-size:11px">&times;${c}</span>`).join('&nbsp;&nbsp;');
    html += `<div class="sc-row">
      <div>
        <div style="font-size:13px;font-weight:500">${esc(cleanProject(s.project))} <span style="color:var(--dim);font-weight:400;font-size:11px;font-family:var(--mono)">${sid.slice(0,8)}</span></div>
        <div style="margin-top:2px">${models}</div>
      </div>
      <div style="text-align:right">
        <div style="font-family:var(--mono);font-size:13px;font-weight:600;font-variant-numeric:tabular-nums">$${s.estimatedCost.toFixed(2)}</div>
        <div style="font-size:11px;color:var(--dim)">${s.prompts} API calls &middot; ${time}</div>
      </div>
    </div>`;
  }
  html += '</div>';
  return html;
}

function renderLearning(learning) {
  if (!learning || !learning.adjustments || !learning.adjustments.length) {
    return `<div class="empty">Not enough data yet. The router needs ${5} samples per family to start learning.</div>`;
  }

  let html = `<div style="display:flex;gap:16px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--separator);font-size:12px">
    <span><strong style="font-family:var(--mono)">${learning.totalSamples}</strong> total samples</span>
    <span><strong style="font-family:var(--mono)">${learning.familiesTracked}</strong> families tracked</span>
    <span><strong style="font-family:var(--mono)">${learning.adjustments.filter(a => a.adjustment?.suggestion === 'upgrade').length}</strong> suggested upgrades</span>
    <span><strong style="font-family:var(--mono)">${learning.adjustments.filter(a => a.adjustment?.suggestion === 'downgrade').length}</strong> suggested downgrades</span>
  </div>`;

  html += '<div style="max-height:280px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--faint) transparent">';

  for (const a of learning.adjustments) {
    const pct = Math.round(a.rate * 100);
    const barW = Math.max(pct, 3);
    const barColor = pct >= 85 ? 'var(--accent)' : pct >= 60 ? 'var(--muted)' : 'var(--danger)';
    const suggestion = a.adjustment?.suggestion || 'tracking';
    const icon = suggestion === 'upgrade' ? '&uarr;' : suggestion === 'downgrade' ? '&darr;' : suggestion === 'confirm' ? '&check;' : '&middot;';
    const sugColor = suggestion === 'upgrade' ? 'var(--danger)' : suggestion === 'downgrade' ? 'var(--accent)' : 'var(--dim)';

    html += `<div style="padding:6px 0;border-bottom:1px solid var(--separator)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="ml ml-${a.model}">${a.model}</span>
          <span style="font-size:11px;color:var(--dim)">${a.family}</span>
          <span style="color:${sugColor};font-size:11px;font-weight:600">${icon} ${suggestion}</span>
        </div>
        <span style="font-family:var(--mono);font-size:12px;font-weight:600">${pct}%<span style="color:var(--dim);font-weight:400"> / ${a.samples}</span></span>
      </div>
      <div style="height:4px;background:var(--separator);border-radius:2px;overflow:hidden">
        <div style="height:100%;width:${barW}%;background:${barColor};border-radius:2px"></div>
      </div>
      ${a.adjustment?.reason ? `<div style="font-size:11px;color:var(--dim);margin-top:3px">${esc(a.adjustment.reason)}</div>` : ''}
    </div>`;
  }

  html += '</div>';
  return html;
}

function renderInsights(insights) {
  if (!insights?.length) return '<div class="empty">No insights yet.</div>';
  const live = insights.filter(i => !i.title.startsWith('[Historical]'));
  const hist = insights.filter(i => i.title.startsWith('[Historical]'));

  let html = '';
  for (const i of live) {
    const dot = i.severity === 'critical' ? 'crit' : i.severity === 'warning' ? 'warn' : i.severity === 'success' ? 'ok' : 'info';
    const card = i.severity === 'critical' ? 'crit' : i.severity === 'warning' ? 'warn' : i.severity === 'success' ? 'ok' : 'info';
    html += `<div class="ins-item ins-item-${card}">
      <div class="ins-title"><span class="ins-dot ins-dot-${dot}"></span>${esc(i.title)}</div>
      <div class="ins-detail">${esc(i.detail)}</div>
      <div class="ins-action">${esc(i.action)}</div>
    </div>`;
  }
  if (hist.length) {
    html += `<div style="margin-top:6px">
      <button onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'" style="font-size:11px;color:var(--dim);background:none;border:1px solid var(--border);border-radius:4px;padding:3px 8px;cursor:pointer;font-family:inherit">${hist.length} historical</button>
      <div style="display:none">`;
    for (const i of hist) {
      html += `<div class="ins-item ins-item-info" style="opacity:0.6">
        <div class="ins-title"><span class="ins-dot ins-dot-info"></span>${esc(i.title)}</div>
        <div class="ins-detail">${esc(i.detail)}</div>
        <div class="ins-action">${esc(i.action)}</div>
      </div>`;
    }
    html += '</div></div>';
  }
  return html;
}

function renderHourGrid(hours) {
  const isDark = getTheme() === 'dark';
  const max = Math.max(...Object.values(hours||{}), 1);
  let html = '<div class="hr-grid" role="img" aria-label="Activity heatmap by hour of day">';
  for (let h = 0; h < 24; h++) {
    const c = (hours||{})[String(h)] || 0;
    const i = c / max;
    const bg = i === 0 ? 'var(--separator)'
      : isDark ? `rgba(212, 168, 67, ${0.1 + i * 0.6})`
      : `rgba(180, 132, 31, ${0.08 + i * 0.65})`;
    html += `<div class="hr-cell" style="background:${bg}" title="${h}:00 — ${c} events" role="img" aria-label="${h}:00: ${c} events"></div>`;
  }
  html += '</div><div class="hr-labels"><span>0h</span><span>6h</span><span>12h</span><span>18h</span><span>24h</span></div>';
  return html;
}

load();
setInterval(load, 30000);
</script>
</body>
</html>
